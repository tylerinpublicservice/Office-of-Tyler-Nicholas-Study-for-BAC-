    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #f8fafc; color: #334155; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        a { text-decoration: none; color: inherit; }

        /* Navbar */

        .nav-links { list-style: none; display: flex; gap: 30px; }
        .nav-links a { font-size: 0.95rem; font-weight: 500; color: #475569; transition: color 0.3s; }
        .nav-links a:hover { color: #2563eb; }

        /* Layout */
        .app-container { display: flex; flex-grow: 1; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 300px; background-color: #0f172a; color: #cbd5e1; overflow-y: auto; display: flex; flex-direction: column; flex-shrink: 0; }

        .nav-item.active { background-color: #2563eb; color: white; font-weight: 500; border-left: 4px solid #60a5fa; }
        .nav-item.method-btn { background-color: #047857; border-left: none; margin-top: auto; border-top: 1px solid #1e293b; }
        .nav-item.method-btn.active { background-color: #059669; }

        /* Main Content */
        .main-content { flex-grow: 1; padding: 40px; overflow-y: auto; background-color: #f8fafc; }
        .text-section { display: none; max-width: 900px; margin: 0 auto; animation: fadeIn 0.4s ease-in-out; }
        .text-section.active { display: block; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .text-title { font-size: 2rem; color: #0f172a; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 2px solid #e2e8f0; }

        /* Color-Coded Cards */
        .card { padding: 25px; border-radius: 10px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); line-height: 1.7; }
        .card h3 { font-size: 1.2rem; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .card ul { margin-left: 20px; margin-bottom: 15px; }
        .card li { margin-bottom: 8px; }
        .card p { margin-bottom: 15px; }
        .card strong { color: #1e293b; }

        /* Specific Colors for Cognitive Association */
        .card-elements { background-color: #eff6ff; border-left: 5px solid #3b82f6; } /* Blue */
        .card-elements h3 { color: #1d4ed8; }
        
        .card-intro { background-color: #f0fdf4; border-left: 5px solid #22c55e; } /* Green */
        .card-intro h3 { color: #15803d; }
        
        .card-analyse { background-color: #ffffff; border: 1px solid #e2e8f0; border-top: 5px solid #64748b; } /* Grey/White */
        .card-analyse h3 { color: #334155; }
        .mouvement { background: #f8fafc; padding: 15px; border-radius: 6px; margin-bottom: 15px; border-left: 3px solid #94a3b8; }
        .mouvement h4 { margin-bottom: 10px; color: #0f172a; }
        
        .card-conclusion { background-color: #faf5ff; border-left: 5px solid #a855f7; } /* Purple */
        .card-conclusion h3 { color: #7e22ce; }
        
        .card-grammaire { background-color: #fffbeb; border-left: 5px solid #f59e0b; } /* Orange */
        .card-grammaire h3 { color: #b45309; }

        .formula { background: #1e293b; color: #60a5fa; padding: 15px; border-radius: 8px; text-align: center; font-weight: 600; margin-bottom: 30px; }

    </style>

                intro: `<p>Queneau (XXe siècle) renouvelle le thème ancien du « carpe diem ». Il utilise une langue familière, un rythme de chanson et un ton drôle/cruel pour mettre en garde une jeune fille sur la fuite du temps.<br><br>

                analyse: `<div class="mouvement"><h4>Mouvement 1 — Une adresse à la jeune fille</h4>

                <div class="formula">
                    Formule simple à toujours utiliser :<br>
                    Citation courte → procédé → interprétation → lien avec la problématique.
                </div>
                
                <div class="card card-elements">
                    <h3>1. Pendant les 30 minutes de préparation</h3>
                    <ul>
                        <li>Tu lis le texte une première fois pour comprendre le sens général.</li>
                        <li>Tu identifies : auteur, œuvre, siècle, genre, objet d’étude, parcours.</li>
                        <li>Tu trouves la problématique.</li>
                        <li>Tu divises le texte en 2 ou 3 mouvements.</li>
                        <li>Tu notes pour chaque mouvement : 2 ou 3 citations courtes, le procédé, l’interprétation.</li>
                        <li>Tu prépares une conclusion avec ouverture.</li>
                        <li>Tu prépares une réponse simple à la grammaire.</li>
                    </ul>
                </div>
                <div class="card card-intro">
                    <h3>2. Pendant les 12 minutes d’explication</h3>
                    <ul>
                        <li>Tu présentes l’auteur et l’œuvre.</li>
                        <li>Tu remets le passage dans son contexte.</li>
                        <li>Tu lis le texte clairement.</li>
                        <li>Tu annonces la problématique et les mouvements.</li>
                        <li>Tu fais ton analyse dans l’ordre du texte et tu conclus proprement.</li>
                    </ul>
                </div>
                <div class="card card-grammaire">
                    <h3>3. Pendant la question de grammaire</h3>
                    <p>Réponds simplement. Utilise cette structure :</p>
                    <ul>
                        <li>« C’est ... »</li>
                        <li>« Il est introduit par ... »</li>
                        <li>« Sa fonction est ... »</li>
                        <li>« Son effet dans le texte est ... »</li>
                    </ul>
                </div>
                <div class="card card-analyse">
                    <h3>4. Pendant l’entretien</h3>
                    <p>La meilleure structure :</p>
                    <ul>
                        <li>J’ai choisi cette œuvre parce que...</li>
                        <li>Ce qui m’a marqué, c’est...</li>
                        <li>Elle correspond au parcours parce que...</li>
                        <li>Un passage important montre que...</li>
                        <li>Mon jugement personnel est que...</li>
                    </ul>
                </div>
                <div class="card card-conclusion">
                    <h3>5. Règles pour viser 20/20</h3>
                    <ul>
                        <li>Ne paraphrase pas. Analyse.</li>
                        <li>Ne cite pas un procédé sans expliquer son effet.</li>
                        <li>Reviens toujours à la problématique.</li>
                        <li>Montre que tu connais l’œuvre complète, pas seulement l’extrait.</li>
                        <li>Tu as besoin d’une pensée claire, de phrases correctes et d’une vraie maîtrise.</li>

            sidebar.appendChild(navItem);

            // Main content section

            section.className = 'text-section';

        }
